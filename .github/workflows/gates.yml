name: ci
on:
  push:
  pull_request:

# One in-flight run per ref: a new push cancels the now-superseded run, except on
# main where every commit stays fully gated. Stops stacked ~6-min snapshot-gate
# runs piling up on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Two gate mechanisms, kept distinct (consistency pass §3, scope & guarantees §5):
#   currency-gate  — the static boundary contract is a pure function of the code,
#                    so it is regenerated and checked for drift (`boundary --check`).
#   snapshot-gate  — the behavioral goldens are a function of running the code, so
#                    they ride `go test`; a stale golden fails the suite.
# Both are unified only by CODEOWNERS routing + fail-on-unexpected-change + the
# human-as-oracle; neither lets an AI judge.
jobs:
  snapshot-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Pinned to a specific patch (not the floating "1.25") so the golden
          # and digest gates run on a deterministic toolchain — an SSA/codegen
          # change in a future patch can't surface as a confusing golden-drift
          # failure. Bump deliberately and regen goldens in the same commit.
          go-version: "1.25.11"
      - run: go build ./...
      - run: go vet ./...
      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.5.0
          golangci-lint run
      - name: gofmt
        run: make fmt-check # names the offending files on failure, unlike a bare test -z
      - run: go test -race ./...
      - name: behavioral gate (fixture flow goldens)
        run: cd testdata/fixtures/loansvc && go build ./... && go test -race ./...

  # coverage-floor — the engines are the best-covered code, but every verdict is
  # only as sound as the graph the static front-end hands them, and a front-end
  # bug corrupts that graph silently rather than crashing. This floor stops the
  # front-end (loader/analyze/signatures) eroding while the engines stay green
  # (docs/design/ideas/front-end-test-hardening.md).
  coverage-floor:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.11"
      - name: total coverage floor
        run: make cover-floor

  currency-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Pinned to a specific patch (not the floating "1.25") so the golden
          # and digest gates run on a deterministic toolchain — an SSA/codegen
          # change in a future patch can't surface as a confusing golden-drift
          # failure. Bump deliberately and regen goldens in the same commit.
          go-version: "1.25.11"
      # Regenerate the gated boundary contract from code and fail if it drifted
      # from the committed artifact — the static currency check.
      - name: boundary currency
        run: go run ./cmd/flowmap boundary --check testdata/fixtures/loansvc
      # Regenerate the groundwork graph/contract/branch goldens from the fixtures
      # and fail if any drifted from the committed files. boundary --check only
      # covers the one boundary contract; this closes the "edited a fixture (or
      # shifted the graph schema) but forgot to regen" hole for the goldens that
      # regen.sh owns. The section-count + content-digest ratchets (run under
      # `go test`) cover the complementary "regen laundered a regression" hole.
      - name: groundwork goldens currency
        run: |
          testdata/groundwork/regen.sh
          git diff --exit-code testdata/groundwork/goldens
