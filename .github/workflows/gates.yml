name: ci
on:
  push:
  pull_request:

# Two gate mechanisms, kept distinct (consistency pass §3, scope & guarantees §5):
#   currency-gate  — the static boundary contract is a pure function of the code,
#                    so it is regenerated and checked for drift (`boundary --check`).
#   snapshot-gate  — the behavioral goldens are a function of running the code, so
#                    they ride `go test`; a stale golden fails the suite.
# Both are unified only by CODEOWNERS routing + fail-on-unexpected-change + the
# human-as-oracle; neither lets an AI judge.
jobs:
  snapshot-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go build ./...
      - run: go vet ./...
      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.5.0
          golangci-lint run
      - name: gofmt
        run: test -z "$(gofmt -l . | grep -v '^testdata/fixtures/loansvc/')"
      - run: go test -race ./...
      - name: behavioral gate (fixture flow goldens)
        run: cd testdata/fixtures/loansvc && go build ./... && go test -race ./...

  currency-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      # Regenerate the gated boundary contract from code and fail if it drifted
      # from the committed artifact — the static currency check.
      - name: boundary currency
        run: go run ./cmd/flowmap boundary --check testdata/fixtures/loansvc
