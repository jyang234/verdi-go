name: ci
on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go build ./...
      - run: go vet ./...
      - name: gofmt
        run: test -z "$(gofmt -l . | grep -v '^testdata/fixtures/loansvc/')"
      - run: go test ./...
      - name: build and gate fixture module
        run: cd testdata/fixtures/loansvc && go build ./... && go test ./...

# Phase 8 adds the two gate jobs:
#   currency-gate:  flowmap boundary --check   (regenerate boundary contract + git diff --exit-code)
#   snapshot-gate:  go test ./...              (in-process flow goldens; -update to re-baseline)
