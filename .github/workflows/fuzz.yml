name: fuzz
# The PR gate (go test) only replays each fuzz target's seed corpus. This nightly
# job EXPLORES beyond the seeds and accumulates its generated corpus across runs
# (see the cache step), so coverage deepens night over night instead of restarting
# from the seeds. A loader panic on novel untrusted input is caught here rather
# than in production; a crash fails the job and the offending input is uploaded.
on:
  schedule:
    - cron: "0 7 * * *" # nightly, 07:00 UTC
  workflow_dispatch:

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false # one target crashing must not hide the others
      # EVERY FuzzXxx in the repo is listed here — the nightly job must explore all
      # of them, not a subset (M-21). TestFuzzWorkflowListsEveryTarget (in
      # internal/fuzzcov) fails the PR gate if a new fuzz target is added without a
      # matching matrix row, so this list cannot silently fall behind the code.
      matrix:
        include:
          # Trust-boundary loaders: a panic on novel untrusted input is a crash.
          - pkg: ./internal/groundwork/graph
            target: FuzzGraphLoad
          - pkg: ./internal/groundwork/contract
            target: FuzzContractLoad
          - pkg: ./internal/otlpjson
            target: FuzzDecodeNoPanic
          - pkg: ./internal/otlpjson
            target: FuzzIntStrFailsClosed
          # Determinism gates: a concurrent/unordered group's IR must be blind to the
          # race outcome, and the canonical marshaler / FQN order must be total & stable.
          - pkg: ./internal/canon
            target: FuzzCanonConcurrentOrderInvariant
          - pkg: ./internal/canon
            target: FuzzCanonSiblingOrderInvariant
          - pkg: ./internal/canonjson
            target: FuzzMarshalDeterministic
          - pkg: ./internal/impeach
            target: FuzzCanonFQNSymmetry
          - pkg: ./internal/impeach
            target: FuzzCanonFQNTotal
          - pkg: ./internal/impeach
            target: FuzzWitnessSortStrictWeakOrder
          # Redaction / normalization invariants (FuzzNormalizeIdempotent already
          # found a real bug; FuzzNormalizeNoLiteralLeak is H-1's leak-property gate).
          - pkg: ./internal/canon/sql
            target: FuzzNormalizeIdempotent
          - pkg: ./internal/canon/sql
            target: FuzzNormalizeNoLiteralLeak
          - pkg: ./internal/canon/url
            target: FuzzTemplateInvariants
          # Static-analysis confinement.
          - pkg: ./internal/static/rebind
            target: FuzzRebindConfinement
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.11"
          cache: false # we manage only the fuzz corpus below; the build cache isn't worth the path overlap
      - name: locate fuzz corpus cache
        id: fuzzcache
        run: echo "dir=$(go env GOCACHE)/fuzz" >> "$GITHUB_OUTPUT"
      # Accumulate the generated corpus across nights: restore the most recent
      # prior corpus, fuzz on top of it (growing coverage), then save a new entry.
      # The run-id key never hits, so the cache is always saved; restore-keys pulls
      # the latest prior corpus as the starting point — the standard Go-fuzz
      # accumulating-cache pattern. Scheduled runs use the default branch's cache
      # scope, so the corpus persists across nights.
      - name: restore/save fuzz corpus
        uses: actions/cache@v4
        with:
          path: ${{ steps.fuzzcache.outputs.dir }}
          key: fuzz-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            fuzz-${{ matrix.target }}-
      - name: fuzz ${{ matrix.target }}
        run: go test ${{ matrix.pkg }} -run '^$' -fuzz '^${{ matrix.target }}$' -fuzztime 5m
      - name: upload crashers
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashers-${{ matrix.target }}
          path: ${{ matrix.pkg }}/testdata/fuzz/
          if-no-files-found: ignore
