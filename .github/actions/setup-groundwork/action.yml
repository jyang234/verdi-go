name: Setup flowmap + groundwork
description: >
  Install the flowmap (producer) and groundwork (judge) binaries for the
  structural gate. Pin this action to a commit; the binaries are built from
  the pinned source, so the gate's behavior is exactly as reviewed.
runs:
  using: composite
  steps:
    - name: install binaries
      shell: bash
      run: |
        # Fail closed when no ref resolved: floating to @latest would install
        # gate binaries nobody reviewed, the opposite of this action's promise.
        ref='${{ github.action_ref }}'
        if [ -z "$ref" ]; then
          echo "setup-groundwork: github.action_ref is empty; pin this action to a commit or tag" >&2
          exit 1
        fi
        go install "github.com/jyang234/golang-code-graph/cmd/flowmap@$ref"
        go install "github.com/jyang234/golang-code-graph/cmd/groundwork@$ref"
        echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
