version: 1
service: obligsvc
classify:
  busPublish:
    - "example.com/obligsvc/internal/bus#Publish"
obligations:
  - name: tx-must-close
    acquire: "example.com/obligsvc/internal/store#BeginTx"
    release:
      - "example.com/obligsvc/internal/store#Commit"
      - "example.com/obligsvc/internal/store#Rollback"
  - name: audit-before-publish
    require: "example.com/obligsvc/internal/audit#Write"
    before: "example.com/obligsvc/internal/bus#Publish"
  - name: txc-must-close
    acquire: "example.com/obligsvc/internal/store#BeginTxC"
    release:
      - "example.com/obligsvc/internal/store#Commit"
      - "example.com/obligsvc/internal/store#Rollback"
  - name: sem-must-release
    acquire: "example.com/obligsvc/internal/store#Acquire"
    release:
      - "example.com/obligsvc/internal/store#Release"
  # Deliberately inert: the anchor was "renamed away". The UNMATCHED disclosure
  # is the fixture's dead-guardrail case.
  - name: renamed-away
    acquire: "example.com/obligsvc/internal/store#BeginTransaction"
    release:
      - "example.com/obligsvc/internal/store#Commit"
  # Guard-intent (CX-2): the validation may run in callers, so the rule opts
  # into the entry-domination lift. Pairing-intent rules (audit-before-publish
  # above) deliberately do not.
  - name: validate-before-send
    require: "example.com/obligsvc/internal/gate#Validate"
    before: "example.com/obligsvc/internal/outbound#Send"
    fromCallers: true
