version: 1
service: impeachsvc

# database/sql is the only boundary seam; the DB hint lets the static labeler read
# the constant statements into "boundary:db <OP> <table>" edges. There is no bus
# or outbound-HTTP seam in this fixture — its whole point is the route→DB
# attribution gap created by the custom (unhinted) admin router.
classify:
  db: ["database/sql"]
